<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | EduHub Students Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="card-header">
      <div class="logo-icon">🔒</div>
      <h2>Create New Password</h2>
      <p>Choose a strong, secure password</p>
    </div>
    <div class="card-body">
      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat new password" required>
        </div>
        <button type="submit" class="login-btn">Update Password →</button>
        <div class="auth-links" style="justify-content:center;">
          <a href="index.html" class="forgot-btn">← Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="script.js"></script>
</body>
</html>
