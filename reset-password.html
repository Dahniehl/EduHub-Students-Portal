<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | EduHub Students Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Eye toggle wrapper ── */
    .pw-wrap {
      position: relative;
    }
    .pw-wrap input {
      padding-right: 2.8rem !important;
    }
    .pw-eye {
      position: absolute;
      right: .85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      color: var(--gray-400);
      font-size: 1.05rem;
      transition: color .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
    }
    .pw-eye:hover { color: var(--navy); }
    .pw-eye svg { pointer-events: none; }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="card-header">
      <div class="logo-icon">🔒</div>
      <h2>Create New Password</h2>
      <p>Choose a strong, secure password</p>
    </div>
    <div class="card-body">
      <form id="resetPasswordForm">

        <div class="form-group">
          <label for="password">New Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Min. 8 characters" required>
            <button type="button" class="pw-eye" onclick="togglePw('password', this)" aria-label="Show password">
              <svg id="password-eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="pw-wrap">
            <input type="password" id="confirmPassword" placeholder="Repeat new password" required>
            <button type="button" class="pw-eye" onclick="togglePw('confirmPassword', this)" aria-label="Show password">
              <svg id="confirmPassword-eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn">Update Password →</button>
        <div class="auth-links" style="justify-content:center;">
          <a href="index.html" class="forgot-btn">← Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="script.js"></script>
<script>
  function togglePw(inputId, btn) {
    const input   = document.getElementById(inputId);
    const iconEl  = document.getElementById(inputId + '-eye-icon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';

    iconEl.innerHTML = isHidden
      ? `<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;

    btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  }
</script>
</body>
</html>
