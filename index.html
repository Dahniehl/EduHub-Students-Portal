<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | EduHub Students Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Demo hint button */
    .demo-strip {
      background: rgba(201,168,76,.08);
      border: 1.5px dashed rgba(201,168,76,.45);
      border-radius: var(--radius-sm);
      padding: .75rem 1rem;
      margin-bottom: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .8rem;
      flex-wrap: wrap;
    }
    .demo-strip p {
      font-size: .8rem;
      color: var(--gray-600);
      line-height: 1.5;
    }
    .demo-strip p strong { color: var(--navy); font-weight: 700; }
    .demo-strip p code {
      background: var(--gray-200);
      border-radius: 4px;
      padding: .1rem .35rem;
      font-size: .77rem;
      font-family: monospace;
    }
    .demo-fill-btn {
      padding: .45rem 1rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
      font-size: .79rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .demo-fill-btn:hover { transform: scale(1.04); box-shadow: 0 3px 12px rgba(201,168,76,.4); }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="card-header">
      <div class="logo-icon">🎓</div>
      <h2>EduHub Students Portal</h2>
      <p>Sign in to your account</p>
    </div>

    <div class="card-body">

      <!-- Demo credentials strip -->
      <div class="demo-strip">
        <p>
          <strong>🔑 Demo Account</strong><br>
          Email: <code>demo@eduhub.com</code> &nbsp;·&nbsp;
          Password: <code>demo1234</code>
        </p>
        <button class="demo-fill-btn" id="demoHint">⚡ Fill Demo</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="login-btn">Sign In →</button>
        <div class="auth-links">
          <a href="forgot-password.html" class="forgot-btn">Forgot Password?</a>
          <a href="create-account.html" class="create-btn">Create New Account</a>
        </div>
      </form>

    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="script.js"></script>
<script>
  // If already logged in (demo or supabase), skip login page
  if (localStorage.getItem('eduhub_demo_session') === 'active') {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
