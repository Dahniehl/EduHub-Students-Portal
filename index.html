<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | EduHub Students Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Demo hint button */
    .demo-strip {
      background: rgba(201,168,76,.08);
      border: 1.5px dashed rgba(201,168,76,.45);
      border-radius: var(--radius-sm);
      padding: .75rem 1rem;
      margin-bottom: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .8rem;
      flex-wrap: wrap;
    }
    .demo-strip p {
      font-size: .8rem;
      color: var(--gray-600);
      line-height: 1.5;
    }
    .demo-strip p strong { color: var(--navy); font-weight: 700; }
    .demo-strip p code {
      background: var(--gray-200);
      border-radius: 4px;
      padding: .1rem .35rem;
      font-size: .77rem;
      font-family: monospace;
    }
    .demo-fill-btn {
      padding: .45rem 1rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
      font-size: .79rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .demo-fill-btn:hover { transform: scale(1.04); box-shadow: 0 3px 12px rgba(201,168,76,.4); }

    /* ── Eye toggle wrapper ── */
    .pw-wrap {
      position: relative;
    }
    .pw-wrap input {
      padding-right: 2.8rem !important;
    }
    .pw-eye {
      position: absolute;
      right: .85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      color: var(--gray-400);
      font-size: 1.05rem;
      transition: color .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
    }
    .pw-eye:hover { color: var(--navy); }
    .pw-eye svg { pointer-events: none; }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="card-header">
      <div class="logo-icon">🎓</div>
      <h2>EduHub Students Portal</h2>
      <p>Sign in to your account</p>
    </div>

    <div class="card-body">

      <!-- Demo credentials strip -->
      <div class="demo-strip">
        <p>
          <strong>🔑 Demo Account</strong><br>
          Email: <code>demo@eduhub.com</code> &nbsp;·&nbsp;
          Password: <code>demo1234</code>
        </p>
        <button class="demo-fill-btn" id="demoHint">⚡ Fill Demo</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Enter your password" required>
            <button type="button" class="pw-eye" onclick="togglePw('password', this)" aria-label="Show password">
              <!-- Eye icon (show) -->
              <svg id="password-eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn">Sign In →</button>
        <div class="auth-links">
          <a href="forgot-password.html" class="forgot-btn">Forgot Password?</a>
          <a href="create-account.html" class="create-btn">Create New Account</a>
        </div>
      </form>

    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="script.js"></script>
<script>
  // If already logged in, skip login page
  if (localStorage.getItem('eduhub_demo_session') === 'active') {
    window.location.href = 'dashboard.html';
  }

  // Eye toggle function (shared across all pages)
  function togglePw(inputId, btn) {
    const input   = document.getElementById(inputId);
    const iconEl  = document.getElementById(inputId + '-eye-icon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';

    // Swap icon between eye and eye-off
    iconEl.innerHTML = isHidden
      ? /* eye-off */
        `<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : /* eye */
        `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;

    btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  }
</script>
</body>
</html>
