<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | EduHub Students Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="card-header">
      <div class="logo-icon">✦</div>
      <h2>Create Your Account</h2>
      <p>Secure Student Registration</p>
    </div>
    <div class="card-body">
      <form id="createAccountForm">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="e.g. Daniel Ukpong" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
        </div>
        <button type="submit" class="login-btn">Create Account →</button>
        <div class="auth-links">
          <span style="font-size:.85rem;color:#9aa3b2;">Already have an account?</span>
          <a href="index.html" class="create-btn">Sign In Here</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="script.js"></script>
</body>
</html>
