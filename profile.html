<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | EduHub Students Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="site-name">
      <h2>Edu<span style="color:var(--gold)">Hub</span></h2>
    </div>
  </div>
  <div class="header-right">
    <div class="menu-container">
      <div class="menu-icon" onclick="toggleMenu()">⋮</div>
      <div class="dropdown" id="menuDropdown">
        <div class="user-info">
          <p class="user-name" id="userName">Loading…</p>
          <p class="user-email" id="userEmail"></p>
        </div>
        <hr>
        <a href="dashboard.html">🏠 Home</a>
        <a href="about.html">📖 About</a>
        <a href="profile.html">👤 Profile</a>
        <a href="settings.html">⚙️ Settings</a>
        <button class="logout" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </div>
</header>

<!-- PROFILE -->
<div class="profile-container page-fade">
  <div class="profile-card">
    <div class="profile-card-header">
      <h2>My Profile</h2>
      <div class="profile-avatar" id="avatarInitials">?</div>
    </div>
    <div class="profile-body">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" readonly placeholder="Your name will appear here">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" readonly placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number">
      </div>
      <div class="form-group">
        <label for="age">Date of Birth</label>
        <input type="date" id="age">
      </div>
      <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="script.js"></script>
</body>
</html>
